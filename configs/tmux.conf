# ==============================================================================
# tmux.conf — Optimized for Claude Code parallel development over Mosh
# https://github.com/krossystems/server-init
# ==============================================================================

# ── Prefix ───────────────────────────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ── General ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB"
set -g escape-time 0                # zero delay for remote usage
set -g history-limit 100000
set -g mouse on
set -g focus-events on
set -g set-clipboard on

# Window numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Allow OSC notifications to pass through to the terminal
set -g allow-passthrough on

# Bell behavior: mark background windows that ring the bell
set -g monitor-bell on
set -g bell-action other
set -g visual-bell off

# Activity (silent — rely on bell for notifications)
setw -g monitor-activity off
set -g visual-activity off

# Vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard 2>/dev/null || true"

# ── Window navigation (Alt+key, no prefix needed) ───────────────────────────
# Alt+1..9,0 jump to window
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9
bind -n M-0 select-window -t :10

# Alt+[ / Alt+] cycle windows
bind -n M-[ previous-window
bind -n M-] next-window

# Alt+N new window
bind -n M-n new-window

# ── Pane navigation (Alt+hjkl / Alt+arrows, no prefix needed) ───────────────
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R

# ── Pane splitting (Prefix+| and Prefix+-) ──────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Pane management ─────────────────────────────────────────────────────────
# Prefix+V: join next window as a side-by-side pane
bind V join-pane -h -s :+1

# Prefix+B: break current pane into its own window
bind B break-pane

# ── Popup (Tmux 3.3+) ───────────────────────────────────────────────────────
# Alt+F: toggle floating popup shell
# Graceful degradation: if tmux < 3.3, show a message instead
if-shell "tmux -V | awk '{if ($2+0 >= 3.3) exit 0; else exit 1}'" \
  "bind -n M-f display-popup -E -w 80% -h 80%" \
  "bind -n M-f display-message 'display-popup requires tmux 3.3+'"

# ── Reload config ───────────────────────────────────────────────────────────
bind R source-file ~/.tmux.conf \; display-message "Config reloaded"

# ── Clear bell marker on focus ───────────────────────────────────────────────
# When a pane gains focus, strip the 🔔 prefix from the window name
set-hook -g pane-focus-in "run-shell '~/.claude/hooks/clear-bell.sh #{window_id} #{window_name}'"

# ── Colorscheme — Terminus Dark ─────────────────────────────────────────────
# Background: #1a1a2e  Foreground: #e0e0e0

# Status bar
set -g status-style "bg=#1a1a2e,fg=#e0e0e0"
set -g status-left-length 30
set -g status-right-length 50
set -g status-left "#[bg=#82aaff,fg=#1a1a2e,bold] #S #[default] "
set -g status-right "#[fg=#546e7a]#H  %H:%M "

# Window status
setw -g window-status-format "#[fg=#546e7a] #I:#W "
setw -g window-status-current-format "#[fg=#c3e88d,bold] #I:#W "
setw -g window-status-bell-style "fg=#ffcb6b,bold"

# Pane borders
set -g pane-border-style "fg=#546e7a"
set -g pane-active-border-style "fg=#82aaff"

# Message / command line
set -g message-style "bg=#1a1a2e,fg=#c3e88d"
set -g message-command-style "bg=#1a1a2e,fg=#c3e88d"

# Copy mode highlight
setw -g mode-style "bg=#82aaff,fg=#1a1a2e"
